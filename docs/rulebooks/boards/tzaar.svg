  <circle cx="188" cy="238" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="220" cy="294" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="155" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="188" cy="462" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="220" cy="406" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="253" cy="518" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
