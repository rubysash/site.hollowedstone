  <circle cx="155" cy="518" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="188" cy="574" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="220" cy="630" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="285" cy="630" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="350" cy="630" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="415" cy="630" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="480" cy="574" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="545" cy="518" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="577" cy="462" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="577" cy="518" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Legend -->
  <g font-family="Georgia, serif" font-size="11" fill="#333">
    <circle cx="120" cy="670" r="10" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
    <text x="138" y="675">Tzaar (6 each)</text>
    <circle cx="280" cy="670" r="8" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
