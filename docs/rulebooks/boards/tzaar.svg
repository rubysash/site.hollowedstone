<svg viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="700" fill="#f5edd6"/>

  <text x="350" y="35" text-anchor="middle" font-size="18" font-family="Georgia, serif" fill="#222" letter-spacing="0.15em" font-weight="bold">TZAAR</text>
  <text x="350" y="55" text-anchor="middle" font-size="11" font-family="Georgia, serif" fill="#555" font-style="italic">60-space hex board - 3 piece types - stacking - GIPF series</text>

  <!-- Board lines connecting intersections (3 axes / 6 directions) -->
  <!-- Using the same hex geometry as the Agon board but with center removed -->
  <!-- Center at 350,350. Ring spacing ~65px. -->

  <!-- Radial lines from center outward (12 spokes) -->
  <g stroke="#a09078" stroke-width="1.5" opacity="0.7">
    <!-- 6 main directions, each from ring 1 to ring 4 -->
    <!-- Direction 0 (right): -->
    <line x1="415" y1="350" x2="610" y2="350"/>
    <!-- Direction 1 (upper-right): -->
    <line x1="383" y1="294" x2="545" y2="70"/>
    <!-- Direction 2 (upper-left): -->
    <line x1="318" y1="294" x2="155" y2="70"/>
    <!-- Direction 3 (left): -->
    <line x1="285" y1="350" x2="90" y2="350"/>
    <!-- Direction 4 (lower-left): -->
    <line x1="318" y1="406" x2="155" y2="630"/>
    <!-- Direction 5 (lower-right): -->
    <line x1="383" y1="406" x2="545" y2="630"/>
  </g>

  <!-- Ring circles (concentric hexagonal rings) -->
  <!-- Ring 1 (6 nodes) -->
  <polygon points="415,350 383,294 318,294 285,350 318,406 383,406" fill="none" stroke="#a09078" stroke-width="1.5" opacity="0.7"/>
  <!-- Ring 2 (12 nodes) -->
  <polygon points="480,350 447,238 350,182 253,238 220,350 253,462 350,518 447,462" fill="none" stroke="#a09078" stroke-width="1.5" opacity="0.7"/>
  <!-- Ring 3 (18 nodes) -->
