  <circle cx="415" cy="518" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="480" cy="406" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
