  <!-- Central hole marker -->
  <circle cx="350" cy="350" r="12" fill="none" stroke="#a09078" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Intersection nodes (60 total, center removed) -->
  <!-- Ring 1 (6 nodes) -->
  <circle cx="415" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="383" cy="294" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="1.5"/>
