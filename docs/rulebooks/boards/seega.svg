<svg viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="700" fill="#f5edd6"/>

  <!-- Title -->
  <text x="350" y="40" text-anchor="middle" font-size="18" font-family="Georgia, serif" fill="#222" letter-spacing="0.15em" font-weight="bold">SEEGA</text>
  <text x="350" y="60" text-anchor="middle" font-size="11" font-family="Georgia, serif" fill="#555" font-style="italic">5x5 grid - 12 pieces per player - custodian capture</text>

  <!-- Grid squares (alternating) -->
  <g>
    <!-- Row 1 -->
    <rect x="100" y="100" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="200" y="100" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="300" y="100" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="400" y="100" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="500" y="100" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Row 2 -->
    <rect x="100" y="200" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="200" y="200" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="300" y="200" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="400" y="200" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="500" y="200" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Row 3 -->
    <rect x="100" y="300" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="200" y="300" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="300" y="300" width="100" height="100" fill="#c8b89a" stroke="#8a6e00" stroke-width="3"/>
    <rect x="400" y="300" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="500" y="300" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Row 4 -->
    <rect x="100" y="400" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="200" y="400" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="300" y="400" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="400" y="400" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="500" y="400" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Row 5 -->
    <rect x="100" y="500" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="200" y="500" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="300" y="500" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="400" y="500" width="100" height="100" fill="#d4c8a8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="500" y="500" width="100" height="100" fill="#e8dfc8" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- Center square mark -->
  <circle cx="350" cy="350" r="8" fill="none" stroke="#8a6e00" stroke-width="2.5" opacity="0.7"/>

  <!-- Text: "Empty at start" on center -->
  <text x="350" y="370" text-anchor="middle" font-size="10" fill="#8a6e00" font-family="Georgia, serif" opacity="0.8">center (safe)</text>

  <!-- Sample starting position: board full except center -->
  <!-- Dark pieces (P1): fill one pattern -->
  <!-- Row 1: all dark -->
  <circle cx="150" cy="150" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="150" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="150" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="450" cy="150" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="150" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- Row 2: alternating D L D L D -->
  <circle cx="150" cy="250" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="250" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="350" cy="250" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="450" cy="250" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="550" cy="250" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- Row 3: alternating L D _ D L -->
  <circle cx="150" cy="350" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="250" cy="350" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- center empty -->
  <circle cx="450" cy="350" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="350" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <!-- Row 4: alternating D L D L D -->
  <circle cx="150" cy="450" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="250" cy="450" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="450" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="450" cy="450" r="22" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="450" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <!-- Row 5: all light -->
  <circle cx="150" cy="550" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="250" cy="550" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="350" cy="550" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="450" cy="550" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>
  <circle cx="550" cy="550" r="22" fill="#f0e6d3" stroke="#a08060" stroke-width="2"/>

  <!-- Labels -->
  <style>.label { font-size: 14px; fill: #666; font-family: Georgia, serif; }</style>
  <text class="label" x="150" y="90" text-anchor="middle">a</text>
  <text class="label" x="250" y="90" text-anchor="middle">b</text>
  <text class="label" x="350" y="90" text-anchor="middle">c</text>
  <text class="label" x="450" y="90" text-anchor="middle">d</text>
  <text class="label" x="550" y="90" text-anchor="middle">e</text>
  <text class="label" x="80" y="155" text-anchor="end">1</text>
  <text class="label" x="80" y="255" text-anchor="end">2</text>
  <text class="label" x="80" y="355" text-anchor="end">3</text>
  <text class="label" x="80" y="455" text-anchor="end">4</text>
  <text class="label" x="80" y="555" text-anchor="end">5</text>

  <!-- Legend -->
  <circle cx="150" cy="650" r="12" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <text x="170" y="655" font-size="12" fill="#333" font-family="Georgia, serif">Player 1 (Dark) x12</text>
  <circle cx="400" cy="650" r="12" fill="#f0e6d3" stroke="#a08060" stroke-width="1.5"/>
  <text x="420" y="655" font-size="12" fill="#333" font-family="Georgia, serif">Player 2 (Light) x12</text>
</svg>
