<svg viewBox="0 0 750 750" xmlns="http://www.w3.org/2000/svg">
  <rect width="750" height="750" fill="#f5edd6"/>

  <text x="375" y="35" text-anchor="middle" font-size="16" font-family="Georgia, serif" fill="#222" letter-spacing="0.15em" font-weight="bold">AMAZONS</text>
  <text x="375" y="52" text-anchor="middle" font-size="10" font-family="Georgia, serif" fill="#555" font-style="italic">10x10 grid - 4 amazons per player - arrow shooting - territory</text>

  <!-- 10x10 checkerboard -->
  <g>
    <!-- Generate alternating squares 60x60 starting at 75,65 -->
    <rect x="75" y="65" width="600" height="600" fill="#d4c8a8"/>
    <!-- Dark squares -->
    <g fill="#b8a888">
      <!-- Row 10 (y=65) -->
      <rect x="135" y="65" width="60" height="60"/><rect x="255" y="65" width="60" height="60"/><rect x="375" y="65" width="60" height="60"/><rect x="495" y="65" width="60" height="60"/><rect x="615" y="65" width="60" height="60"/>
      <!-- Row 9 (y=125) -->
      <rect x="75" y="125" width="60" height="60"/><rect x="195" y="125" width="60" height="60"/><rect x="315" y="125" width="60" height="60"/><rect x="435" y="125" width="60" height="60"/><rect x="555" y="125" width="60" height="60"/>
      <!-- Row 8 (y=185) -->
      <rect x="135" y="185" width="60" height="60"/><rect x="255" y="185" width="60" height="60"/><rect x="375" y="185" width="60" height="60"/><rect x="495" y="185" width="60" height="60"/><rect x="615" y="185" width="60" height="60"/>
      <!-- Row 7 (y=245) -->
      <rect x="75" y="245" width="60" height="60"/><rect x="195" y="245" width="60" height="60"/><rect x="315" y="245" width="60" height="60"/><rect x="435" y="245" width="60" height="60"/><rect x="555" y="245" width="60" height="60"/>
      <!-- Row 6 (y=305) -->
      <rect x="135" y="305" width="60" height="60"/><rect x="255" y="305" width="60" height="60"/><rect x="375" y="305" width="60" height="60"/><rect x="495" y="305" width="60" height="60"/><rect x="615" y="305" width="60" height="60"/>
      <!-- Row 5 (y=365) -->
      <rect x="75" y="365" width="60" height="60"/><rect x="195" y="365" width="60" height="60"/><rect x="315" y="365" width="60" height="60"/><rect x="435" y="365" width="60" height="60"/><rect x="555" y="365" width="60" height="60"/>
      <!-- Row 4 (y=425) -->
      <rect x="135" y="425" width="60" height="60"/><rect x="255" y="425" width="60" height="60"/><rect x="375" y="425" width="60" height="60"/><rect x="495" y="425" width="60" height="60"/><rect x="615" y="425" width="60" height="60"/>
      <!-- Row 3 (y=485) -->
      <rect x="75" y="485" width="60" height="60"/><rect x="195" y="485" width="60" height="60"/><rect x="315" y="485" width="60" height="60"/><rect x="435" y="485" width="60" height="60"/><rect x="555" y="485" width="60" height="60"/>
      <!-- Row 2 (y=545) -->
      <rect x="135" y="545" width="60" height="60"/><rect x="255" y="545" width="60" height="60"/><rect x="375" y="545" width="60" height="60"/><rect x="495" y="545" width="60" height="60"/><rect x="615" y="545" width="60" height="60"/>
      <!-- Row 1 (y=605) -->
      <rect x="75" y="605" width="60" height="60"/><rect x="195" y="605" width="60" height="60"/><rect x="315" y="605" width="60" height="60"/><rect x="435" y="605" width="60" height="60"/><rect x="555" y="605" width="60" height="60"/>
    </g>
  </g>

  <!-- Board border -->
  <rect x="75" y="65" width="600" height="600" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- White amazons: a4, d1, g1, j4 -->
  <!-- a=col 0, d=col 3, g=col 6, j=col 9. Row 1=y=605+30, Row 4=y=425+30 -->
  <circle cx="105" cy="455" r="20" fill="#fefefe" stroke="#555" stroke-width="2.5"/>
  <text x="105" y="460" text-anchor="middle" font-size="16" font-weight="bold" fill="#555" font-family="Georgia, serif">A</text>
  <circle cx="285" cy="635" r="20" fill="#fefefe" stroke="#555" stroke-width="2.5"/>
  <text x="285" y="640" text-anchor="middle" font-size="16" font-weight="bold" fill="#555" font-family="Georgia, serif">A</text>
  <circle cx="465" cy="635" r="20" fill="#fefefe" stroke="#555" stroke-width="2.5"/>
  <text x="465" y="640" text-anchor="middle" font-size="16" font-weight="bold" fill="#555" font-family="Georgia, serif">A</text>
  <circle cx="645" cy="455" r="20" fill="#fefefe" stroke="#555" stroke-width="2.5"/>
  <text x="645" y="460" text-anchor="middle" font-size="16" font-weight="bold" fill="#555" font-family="Georgia, serif">A</text>

  <!-- Black amazons: a7, d10, g10, j7 -->
  <circle cx="105" cy="275" r="20" fill="#1a1a1a" stroke="#000" stroke-width="2.5"/>
  <text x="105" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#aaa" font-family="Georgia, serif">A</text>
  <circle cx="285" cy="95" r="20" fill="#1a1a1a" stroke="#000" stroke-width="2.5"/>
  <text x="285" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#aaa" font-family="Georgia, serif">A</text>
  <circle cx="465" cy="95" r="20" fill="#1a1a1a" stroke="#000" stroke-width="2.5"/>
  <text x="465" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#aaa" font-family="Georgia, serif">A</text>
  <circle cx="645" cy="275" r="20" fill="#1a1a1a" stroke="#000" stroke-width="2.5"/>
  <text x="645" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#aaa" font-family="Georgia, serif">A</text>

  <!-- Labels -->
  <style>.label { font-size: 11px; fill: #666; font-family: Georgia, serif; }</style>
  <text class="label" x="105" y="680" text-anchor="middle">a</text>
  <text class="label" x="165" y="680" text-anchor="middle">b</text>
  <text class="label" x="225" y="680" text-anchor="middle">c</text>
  <text class="label" x="285" y="680" text-anchor="middle">d</text>
  <text class="label" x="345" y="680" text-anchor="middle">e</text>
  <text class="label" x="405" y="680" text-anchor="middle">f</text>
  <text class="label" x="465" y="680" text-anchor="middle">g</text>
  <text class="label" x="525" y="680" text-anchor="middle">h</text>
  <text class="label" x="585" y="680" text-anchor="middle">i</text>
  <text class="label" x="645" y="680" text-anchor="middle">j</text>
  <text class="label" x="62" y="640" text-anchor="end">1</text>
  <text class="label" x="62" y="580" text-anchor="end">2</text>
  <text class="label" x="62" y="520" text-anchor="end">3</text>
  <text class="label" x="62" y="460" text-anchor="end">4</text>
  <text class="label" x="62" y="400" text-anchor="end">5</text>
  <text class="label" x="62" y="340" text-anchor="end">6</text>
  <text class="label" x="62" y="280" text-anchor="end">7</text>
  <text class="label" x="62" y="220" text-anchor="end">8</text>
  <text class="label" x="62" y="160" text-anchor="end">9</text>
  <text class="label" x="62" y="100" text-anchor="end">10</text>

  <!-- Legend -->
  <circle cx="120" cy="720" r="10" fill="#fefefe" stroke="#555" stroke-width="1.5"/>
  <text x="138" y="725" font-size="11" fill="#333" font-family="Georgia, serif">White amazon x4</text>
  <circle cx="320" cy="720" r="10" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <text x="338" y="725" font-size="11" fill="#333" font-family="Georgia, serif">Black amazon x4</text>
  <rect x="510" y="712" width="16" height="16" fill="#c0392b" stroke="#922b21" stroke-width="1" rx="2"/>
  <text x="534" y="725" font-size="11" fill="#333" font-family="Georgia, serif">Arrow (burns square)</text>
</svg>
