<svg viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="700" height="700" fill="#f5edd6"/>

  <!-- ═══ BOARD LINES ═══ -->

  <!-- Outer square -->
  <rect x="50" y="50" width="600" height="600"
    fill="none" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Middle square -->
  <rect x="150" y="150" width="400" height="400"
    fill="none" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Inner square -->
  <rect x="250" y="250" width="200" height="200"
    fill="none" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Connecting lines (midpoints of each side) -->
  <!-- Top -->
  <line x1="350" y1="50" x2="350" y2="250"
    stroke="#1a1a1a" stroke-width="3"/>
  <!-- Right -->
  <line x1="650" y1="350" x2="450" y2="350"
    stroke="#1a1a1a" stroke-width="3"/>
  <!-- Bottom -->
  <line x1="350" y1="650" x2="350" y2="450"
    stroke="#1a1a1a" stroke-width="3"/>
  <!-- Left -->
  <line x1="50" y1="350" x2="250" y2="350"
    stroke="#1a1a1a" stroke-width="3"/>

  <!-- ═══ INTERSECTION POINTS ═══ -->

  <!-- Outer ring (ring 1) -->
  <!-- a1: top-left -->
  <circle cx="50"  cy="50"  r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- b1: top-center -->
  <circle cx="350" cy="50"  r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- c1: top-right -->
  <circle cx="650" cy="50"  r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- d1: right-center -->
  <circle cx="650" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- e1: bottom-right -->
  <circle cx="650" cy="650" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- f1: bottom-center -->
  <circle cx="350" cy="650" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- g1: bottom-left -->
  <circle cx="50"  cy="650" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- h1: left-center -->
  <circle cx="50"  cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Middle ring (ring 2) -->
  <!-- a2: top-left -->
  <circle cx="150" cy="150" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- b2: top-center -->
  <circle cx="350" cy="150" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- c2: top-right -->
  <circle cx="550" cy="150" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- d2: right-center -->
  <circle cx="550" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- e2: bottom-right -->
  <circle cx="550" cy="550" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- f2: bottom-center -->
  <circle cx="350" cy="550" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- g2: bottom-left -->
  <circle cx="150" cy="550" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- h2: left-center -->
  <circle cx="150" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Inner ring (ring 3) -->
  <!-- a3: top-left -->
  <circle cx="250" cy="250" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- b3: top-center -->
  <circle cx="350" cy="250" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- c3: top-right -->
  <circle cx="450" cy="250" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- d3: right-center -->
  <circle cx="450" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- e3: bottom-right -->
  <circle cx="450" cy="450" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- f3: bottom-center -->
  <circle cx="350" cy="450" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- g3: bottom-left -->
  <circle cx="250" cy="450" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>
  <!-- h3: left-center -->
  <circle cx="250" cy="350" r="14" fill="#d4a574" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ═══ NODE LABELS ═══ -->
  <style>
    .label { font-size: 11px; fill: #666; font-family: Georgia, serif;
             letter-spacing: 0.04em; }
  </style>

  <!-- Outer labels -->
  <text class="label" x="50"  y="32"  text-anchor="middle">a1</text>
  <text class="label" x="350" y="32"  text-anchor="middle">b1</text>
  <text class="label" x="650" y="32"  text-anchor="middle">c1</text>
  <text class="label" x="678" y="354" text-anchor="start">d1</text>
  <text class="label" x="650" y="680" text-anchor="middle">e1</text>
  <text class="label" x="350" y="680" text-anchor="middle">f1</text>
  <text class="label" x="50"  y="680" text-anchor="middle">g1</text>
  <text class="label" x="22"  y="354" text-anchor="end">h1</text>

  <!-- Middle labels -->
  <text class="label" x="150" y="136" text-anchor="middle">a2</text>
  <text class="label" x="350" y="136" text-anchor="middle">b2</text>
  <text class="label" x="550" y="136" text-anchor="middle">c2</text>
  <text class="label" x="578" y="354" text-anchor="start">d2</text>
  <text class="label" x="550" y="578" text-anchor="middle">e2</text>
  <text class="label" x="350" y="578" text-anchor="middle">f2</text>
  <text class="label" x="150" y="578" text-anchor="middle">g2</text>
  <text class="label" x="122" y="354" text-anchor="end">h2</text>

  <!-- Inner labels -->
  <text class="label" x="250" y="236" text-anchor="middle">a3</text>
  <text class="label" x="350" y="236" text-anchor="middle">b3</text>
  <text class="label" x="450" y="236" text-anchor="middle">c3</text>
  <text class="label" x="478" y="354" text-anchor="start">d3</text>
  <text class="label" x="450" y="478" text-anchor="middle">e3</text>
  <text class="label" x="350" y="478" text-anchor="middle">f3</text>
  <text class="label" x="250" y="478" text-anchor="middle">g3</text>
  <text class="label" x="222" y="354" text-anchor="end">h3</text>

</svg>
