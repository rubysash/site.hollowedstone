<svg viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="700" height="700" fill="#f5edd6"/>

  <!-- Grid lines -->
  <!-- Vertical lines -->
  <line x1="50"  y1="50" x2="50"  y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="125" y1="50" x2="125" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="50" x2="200" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="275" y1="50" x2="275" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="350" y1="50" x2="350" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="425" y1="50" x2="425" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="500" y1="50" x2="500" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="575" y1="50" x2="575" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="650" y1="50" x2="650" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Horizontal lines -->
  <line x1="50" y1="50"  x2="650" y2="50"  stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="125" x2="650" y2="125" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="200" x2="650" y2="200" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="275" x2="650" y2="275" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="350" x2="650" y2="350" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="425" x2="650" y2="425" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="500" x2="650" y2="500" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="575" x2="650" y2="575" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="650" x2="650" y2="650" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Board border -->
  <rect x="50" y="50" width="600" height="600" fill="none" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Special squares -->
  <!-- Throne (center) -->
  <rect x="315" y="315" width="70" height="70" fill="#c8a96e" stroke="#8a6e00" stroke-width="2" rx="3"/>
  <!-- Corner squares (escape targets) -->
  <rect x="15"  y="15"  width="70" height="70" fill="#7a9b6d" stroke="#4a6a3d" stroke-width="2" rx="3"/>
  <rect x="615" y="15"  width="70" height="70" fill="#7a9b6d" stroke="#4a6a3d" stroke-width="2" rx="3"/>
  <rect x="15"  y="615" width="70" height="70" fill="#7a9b6d" stroke="#4a6a3d" stroke-width="2" rx="3"/>
  <rect x="615" y="615" width="70" height="70" fill="#7a9b6d" stroke="#4a6a3d" stroke-width="2" rx="3"/>

  <!-- PIECES: Starting positions -->

  <!-- King on throne (e5) -->
  <circle cx="350" cy="350" r="18" fill="#d4aa00" stroke="#8a6e00" stroke-width="2.5"/>
  <text x="350" y="355" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a3000" font-family="Georgia, serif">K</text>

  <!-- Defenders (white) -->
  <!-- Vertical arm: e7, e6, e4, e3 -->
  <circle cx="350" cy="200" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <circle cx="350" cy="275" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <circle cx="350" cy="425" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <circle cx="350" cy="500" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <!-- Horizontal arm: c5, d5, f5, g5 -->
  <circle cx="200" cy="350" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <circle cx="275" cy="350" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <circle cx="425" cy="350" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>
  <circle cx="500" cy="350" r="15" fill="#fefefe" stroke="#555" stroke-width="2"/>

  <!-- Attackers (dark) -->
  <!-- Top group: d9, e9, f9, e8 -->
  <circle cx="275" cy="50"  r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="50"  r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="425" cy="50"  r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="125" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- Bottom group: d1, e1, f1, e2 -->
  <circle cx="275" cy="650" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="650" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="425" cy="650" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="575" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- Left group: a4, a5, a6, b5 -->
  <circle cx="50"  cy="275" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="50"  cy="350" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="50"  cy="425" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="125" cy="350" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <!-- Right group: i4, i5, i6, h5 -->
  <circle cx="650" cy="275" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="650" cy="350" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="650" cy="425" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <circle cx="575" cy="350" r="15" fill="#1a1a1a" stroke="#000" stroke-width="2"/>

  <!-- NODE LABELS -->
  <style>
    .label { font-size: 9px; fill: #999; font-family: Georgia, serif; letter-spacing: 0.04em; }
  </style>

  <!-- Column labels (top) -->
  <text class="label" x="50"  y="38" text-anchor="middle">a</text>
  <text class="label" x="125" y="38" text-anchor="middle">b</text>
  <text class="label" x="200" y="38" text-anchor="middle">c</text>
  <text class="label" x="275" y="38" text-anchor="middle">d</text>
  <text class="label" x="350" y="38" text-anchor="middle">e</text>
  <text class="label" x="425" y="38" text-anchor="middle">f</text>
  <text class="label" x="500" y="38" text-anchor="middle">g</text>
  <text class="label" x="575" y="38" text-anchor="middle">h</text>
  <text class="label" x="650" y="38" text-anchor="middle">i</text>

  <!-- Row labels (left) -->
  <text class="label" x="36" y="54"  text-anchor="end">9</text>
  <text class="label" x="36" y="129" text-anchor="end">8</text>
  <text class="label" x="36" y="204" text-anchor="end">7</text>
  <text class="label" x="36" y="279" text-anchor="end">6</text>
  <text class="label" x="36" y="354" text-anchor="end">5</text>
  <text class="label" x="36" y="429" text-anchor="end">4</text>
  <text class="label" x="36" y="504" text-anchor="end">3</text>
  <text class="label" x="36" y="579" text-anchor="end">2</text>
  <text class="label" x="36" y="654" text-anchor="end">1</text>

</svg>
