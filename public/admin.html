<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Hollowed Stone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    font-size: 15px;
    padding: 1.5rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .meta { color: #7a8599; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .stats {
    display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 0.8rem 1.2rem;
    min-width: 120px;
  }
  .stat-card .label { font-size: 0.75rem; color: #7a8599; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-card .value { font-size: 1.8rem; font-weight: bold; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  th {
    text-align: left;
    padding: 0.6rem 0.8rem;
    border-bottom: 2px solid #30363d;
    color: #7a8599;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  td {
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid #21262d;
    vertical-align: top;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .phase { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.8rem; font-weight: bold; }
  .phase-waiting { background: #1f2937; color: #9ca3af; }
  .phase-splits { background: #1e293b; color: #60a5fa; }
  .phase-placing { background: #1c2333; color: #a78bfa; }
  .phase-free_move { background: #1a2332; color: #67e8f9; }
  .phase-play { background: #132a13; color: #4ade80; }
  .phase-finished { background: #2a1a0e; color: #f59e0b; }
  .ip { font-family: monospace; font-size: 0.85rem; color: #8b949e; }
  .code { font-family: monospace; font-weight: bold; letter-spacing: 0.1em; }
  .score { font-weight: bold; font-size: 1.1rem; }
  .winner { color: #f59e0b; }
  .time { color: #7a8599; font-size: 0.8rem; }
  .error { color: #f87171; padding: 2rem; text-align: center; }
  .loading { color: #7a8599; padding: 2rem; text-align: center; }
  .refresh-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 0.4rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .refresh-btn:hover { background: #30363d; }
  @media (max-width: 900px) {
    table { font-size: 0.8rem; }
    td, th { padding: 0.4rem; }
  }
</style>
</head>
<body>

<h1>Hollowed Stone — Admin</h1>
<div class="meta">
  <span id="admin-email"></span>
  <span id="last-refresh"></span>
  <button class="refresh-btn" onclick="loadGames()" style="margin-left:1rem;">Refresh</button>
  <select id="limit" onchange="loadGames()" style="margin-left:0.5rem;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:0.3rem 0.5rem;border-radius:4px;font-size:0.85rem;">
    <option value="25">Last 25</option>
    <option value="50" selected>Last 50</option>
    <option value="100">Last 100</option>
    <option value="200">Last 200</option>
  </select>
</div>

<div class="stats" id="stats"></div>

<div id="content"><div class="loading">Loading games...</div></div>

<script>
async function loadGames() {
  const content = document.getElementById('content');
  try {
    const limit = document.getElementById('limit').value;
    const resp = await fetch(`/admin/api/games?limit=${limit}`);
    if (!resp.ok) {
      content.innerHTML = `<div class="error">API error: ${resp.status}</div>`;
      return;
    }
    const data = await resp.json();

    document.getElementById('admin-email').textContent = `Logged in as: ${data.admin}`;
    document.getElementById('last-refresh').textContent = ` | Last refresh: ${new Date().toLocaleTimeString()}`;

    // Stats
    const total = data.total;
    const active = data.games.filter(g => g.phase === 'play' || g.phase === 'placing' || g.phase === 'free_move' || g.phase === 'splits').length;
    const waiting = data.games.filter(g => g.phase === 'waiting').length;
    const finished = data.games.filter(g => g.phase === 'finished').length;

    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="label">Total Games</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value">${active}</div></div>
      <div class="stat-card"><div class="label">Waiting</div><div class="value">${waiting}</div></div>
      <div class="stat-card"><div class="label">Finished</div><div class="value">${finished}</div></div>
    `;

    if (data.games.length === 0) {
      content.innerHTML = '<div class="loading">No games found.</div>';
      return;
    }

    let html = `<table>
      <tr>
        <th>Code</th>
        <th>Theme</th>
        <th>Phase</th>
        <th>P1</th>
        <th>P1 IP</th>
        <th>P2</th>
        <th>P2 IP</th>
        <th>Score</th>
        <th>Moves</th>
        <th>Created</th>
      </tr>`;

    for (const g of data.games) {
      const p1Won = g.result?.winner === 'p1';
      const p2Won = g.result?.winner === 'p2';
      const created = g.created ? new Date(g.created).toLocaleString() : 'n/a';

      html += `<tr>
        <td><span class="code">${g.code}</span></td>
        <td>${g.theme}</td>
        <td><span class="phase phase-${g.phase}">${g.phase}</span></td>
        <td>${g.p1.name}${p1Won ? ' <span class="winner">W</span>' : ''}</td>
        <td><span class="ip">${g.p1.ip}</span></td>
        <td>${g.p2.name}${p2Won ? ' <span class="winner">W</span>' : ''}</td>
        <td><span class="ip">${g.p2.ip}</span></td>
        <td><span class="score">${g.p1.score}</span> - <span class="score">${g.p2.score}</span></td>
        <td>${g.moves}</td>
        <td><span class="time">${created}</span></td>
      </tr>`;
    }

    html += '</table>';
    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
  }
}

loadGames();
</script>
</body>
</html>
