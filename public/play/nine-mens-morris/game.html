<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>9 Men's Morris</title>
<link rel="stylesheet" href="css/board.css">
<link rel="stylesheet" href="css/themes/neutral.css" id="theme-css">
</head>
<body>

<div class="game-layout">

  <!-- Left column — Player 2 (Light) + Move Log -->
  <div class="left-column">
  <div class="player-panel" data-player="p2">
    <div class="player-name">Light</div>
    <div class="player-stats">
      <div class="stat"><span class="stat-label">In Hand:</span> <span class="pieces-in-hand">9</span></div>
      <div class="stat"><span class="stat-label">On Board:</span> <span class="pieces-on-board">0</span></div>
      <div class="stat"><span class="stat-label">Lost:</span> <span class="pieces-lost">0</span></div>
    </div>
    <div class="piece-dots"></div>
  </div>

  <!-- Move log -->
  <div class="log-container">
    <h3 class="log-title">Move Log</h3>
    <div class="move-log"></div>
  </div>
  </div>

  <!-- Center — Board -->
  <div class="board-container">
    <div class="game-header">
      <h1 class="game-title">9 Men's Morris</h1>
      <div class="access-code-row">
        Code: <span class="access-code" title="Click to copy"></span>
      </div>
    </div>

    <div class="status-bar">
      <span class="turn-info">Loading...</span>
    </div>

    <svg class="board-svg" xmlns="http://www.w3.org/2000/svg"></svg>

    <div class="game-footer">
      <button class="btn-small btn-help" onclick="import('./js/help.js').then(m=>m.toggleHelp())">? Help</button>
      <button class="btn-small btn-leave" id="btn-leave">Leave</button>
      <span class="poll-status"></span>
    </div>
    <div class="site-footer">
      <a href="/">Play Games</a>
      <span>|</span>
      <a href="https://github.com/rubysash/site.hollowedstone/tree/main/docs/rulebooks" target="_blank" rel="noopener">Rulebooks</a>
      <span>|</span>
      <a href="/about">About</a>
      <span>|</span>
      <a href="/partners">Partners</a>
      <span>|</span>
      <a href="#" onclick="event.preventDefault();import('/shared/feedback.js').then(m=>m.openFeedback())">Feedback</a>
      <div style="margin-top:0.3rem;font-size:0.65rem;opacity:0.5;">
        <a href="/terms">Terms</a> <span>|</span> <a href="/privacy">Privacy</a>
      </div>
      <span class="build-tag"></span>
    </div>
  </div>

  <!-- Right panel — Player 1 (Dark) -->
  <div class="player-panel right-panel" data-player="p1">
    <div class="player-name">Dark</div>
    <div class="player-stats">
      <div class="stat"><span class="stat-label">In Hand:</span> <span class="pieces-in-hand">9</span></div>
      <div class="stat"><span class="stat-label">On Board:</span> <span class="pieces-on-board">0</span></div>
      <div class="stat"><span class="stat-label">Lost:</span> <span class="pieces-lost">0</span></div>
    </div>
    <div class="piece-dots"></div>
  </div>


</div>

<script type="module">
import { startGame, leaveGame } from './js/game.js';
import { BUILD, BUILD_DATE } from './js/version.js';

document.querySelector('.build-tag').textContent = `v${BUILD}`;
document.getElementById('btn-leave').addEventListener('click', leaveGame);

startGame();
import('/shared/feedback.js').then(m => {
  const code = document.querySelector('.access-code')?.textContent;
  m.initFeedback({ gameCode: code });
});
</script>
</body>
</html>
