<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros — Game</title>
<link rel="stylesheet" href="css/board.css">
</head>
<body>

<div class="game-header">
  <h1>Ouroboros</h1>
  <div class="subtitle">Loading...</div>
  <div class="access-code">------</div>
</div>

<div class="status-bar">
  <div class="turn-info">Connecting...</div>
</div>

<div class="game-container">
  <div class="side-panel">
    <div class="player-panel p2">
      <h3><span class="player-name">Player 2</span></h3>
      <div>Score: <span class="score">0</span> / 5</div>
      <div class="holding-label">Captured:</div>
      <div class="holding-hint" style="display:none">Click a stone to restore it to your edge</div>
      <div class="holding-area" onclick="if(event.target.classList.contains('holding-stone')) window.onHoldingClick(event.target.dataset.role)"></div>
    </div>
    <div class="move-log"></div>
  </div>

  <div class="board-area">
    <svg class="board" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="side-panel">
    <div class="player-panel p1">
      <h3><span class="player-name">Player 1</span></h3>
      <div>Score: <span class="score">0</span> / 5</div>
      <div class="holding-label">Captured:</div>
      <div class="holding-hint" style="display:none">Click a stone to restore it to your edge</div>
      <div class="holding-area" onclick="if(event.target.classList.contains('holding-stone')) window.onHoldingClick(event.target.dataset.role)"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="help-btn">Help</button>
      <button class="btn btn-secondary" id="leave-btn">Leave</button>
    </div>
  </div>
</div>

<div class="lore-callout" style="display:none"></div>
<div class="poll-status" id="poll-status"></div>
<div class="site-footer" id="site-footer">
  <a href="/">Home</a>
  <span>|</span>
  <a href="https://github.com/rubysash/site.hollowedstone" target="_blank" rel="noopener">Git Source</a>
  <span>|</span>
  <a href="https://www.paypal.com/donate/?hosted_button_id=8F2JVZ6PWZ63J" target="_blank" rel="noopener">Donate</a>
  <div class="build-tag" id="build-tag"></div>
</div>

<script type="module">
  import { startGame, leaveGame } from './js/game.js';
  import { BUILD } from './js/version.js';
  import { toggleHelp } from './js/help.js';
  document.getElementById('build-tag').textContent = `v${BUILD}`;
  document.getElementById('help-btn').addEventListener('click', toggleHelp);
  document.getElementById('leave-btn').addEventListener('click', async () => {
    if (confirm('Leave the game? This will forfeit the match.')) {
      await leaveGame();
    }
  });
  startGame();
</script>
</body>
</html>
