name = "hollowedstone"
compatibility_date = "2026-03-15"
main = "worker/index.js"

# Static files served from public/
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/play/*/api/*"]

# KV namespace — replace "placeholder" with actual namespace ID after running:
#   npx wrangler kv:namespace create GAME_STATE
[[kv_namespaces]]
binding = "GAME_STATE"
id = "placeholder"
